name: Build Halo Plugins

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
  workflow_dispatch:

jobs:
  build-plugins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build plugin-comment-moderation
        working-directory: plugins/plugin-comment-moderation
        run: ./gradlew build

      - name: Build plugin-stats-dashboard
        working-directory: plugins/plugin-stats-dashboard
        run: ./gradlew build

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: halo-plugins
          path: |
            plugins/plugin-comment-moderation/build/libs/*.jar
            plugins/plugin-stats-dashboard/build/libs/*.jar
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: plugins/plugin-comment-moderation/build/libs/plugin-comment-moderation-1.0.0.jar
          asset_name: plugin-comment-moderation.jar

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: plugins/plugin-stats-dashboard/build/libs/plugin-stats-dashboard-1.0.0.jar
          asset_name: plugin-stats-dashboard.jar
