name: Deploy Halo Plugins

on:
  push:
    branches:
      - main
    paths:
      - plugins/**
  workflow_dispatch:

jobs:
  deploy-plugins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build plugin-comment-moderation
        working-directory: plugins/plugin-comment-moderation
        run: gradle build

      - name: Build plugin-stats-dashboard
        working-directory: plugins/plugin-stats-dashboard
        run: gradle build

      - name: Build plugin-auto-reply
        working-directory: plugins/plugin-auto-reply
        run: gradle build

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: halo-plugins
          path: |
            plugins/*/build/libs/*.jar
          retention-days: 30

      - name: Build and install plugins on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            if ! command -v gradle >/dev/null 2>&1; then
              echo "Gradle is not installed on server. Please install Gradle 8.10.2+ and JDK 21."
              exit 1
            fi

            cd /opt/halo-blog
            git fetch origin
            git checkout main
            git pull origin main

            cd /opt/halo-blog/plugins/plugin-comment-moderation
            gradle build --no-daemon
            ls -lh /opt/halo-blog/plugins/plugin-comment-moderation/build/libs/*.jar

            cd /opt/halo-blog/plugins/plugin-stats-dashboard
            gradle build --no-daemon
            ls -lh /opt/halo-blog/plugins/plugin-stats-dashboard/build/libs/*.jar

            cd /opt/halo-blog/plugins/plugin-auto-reply
            gradle build --no-daemon
            ls -lh /opt/halo-blog/plugins/plugin-auto-reply/build/libs/*.jar

            HALO_URL="${{ secrets.HALO_EXTERNAL_URL }}"
            TOKEN="${{ secrets.HALO_API_TOKEN }}"
            if [ -z "$TOKEN" ]; then
              echo "HALO_API_TOKEN is required for install/upgrade plugin API."
              exit 1
            fi
            if [ -z "$HALO_URL" ]; then
              HALO_URL="http://127.0.0.1:8090"
            fi

            install_or_upgrade_plugin() {
              local name="$1"
              local jar="$2"
              local status
              local code
              local body_file="/tmp/${name}-api-response.json"

              echo "Processing ${name} with jar ${jar}"
              status=$(curl -sS -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer ${TOKEN}" \
                "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins/${name}" || true)

              if [ "$status" = "200" ]; then
                echo "Plugin ${name} exists, upgrading..."
                code=$(curl -sS -o "${body_file}" -w "%{http_code}" -X POST \
                  "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins/${name}/upgrade" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -F "source=FILE" \
                  -F "file=@${jar}")
              else
                echo "Plugin ${name} not found, installing..."
                code=$(curl -sS -o "${body_file}" -w "%{http_code}" -X POST \
                  "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins/install" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -F "source=FILE" \
                  -F "file=@${jar}")
              fi

              if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
                echo "Install/upgrade failed for ${name}, http=${code}"
                cat "${body_file}" || true
                exit 1
              fi

              code=$(curl -sS -o "${body_file}" -w "%{http_code}" -X PUT \
                "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins/${name}/plugin-state" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"enable": true, "async": false}')

              if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
                echo "Enable failed for ${name}, http=${code}"
                cat "${body_file}" || true
                exit 1
              fi
            }

            install_or_upgrade_plugin \
              "plugin-comment-moderation" \
              "$(ls -1 /opt/halo-blog/plugins/plugin-comment-moderation/build/libs/*.jar | head -n 1)"
            install_or_upgrade_plugin \
              "plugin-stats-dashboard" \
              "$(ls -1 /opt/halo-blog/plugins/plugin-stats-dashboard/build/libs/*.jar | head -n 1)"
            install_or_upgrade_plugin \
              "plugin-auto-reply" \
              "$(ls -1 /opt/halo-blog/plugins/plugin-auto-reply/build/libs/*.jar | head -n 1)"

            echo "Query plugin list after deployment:"
            curl -sS -X GET "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins" \
              -H "Authorization: Bearer ${TOKEN}" || true

            echo "Recent Halo logs related to plugin loading:"
            docker logs --since 5m halo 2>&1 | grep -Ei \
              "plugin|pf4j|plugin-auto-reply|plugin-comment-moderation|plugin-stats-dashboard|failed|error|exception" || true
