name: Deploy Plugins

on:
  # Build and deploy plugin artifacts only when plugin sources change.
  push:
    branches:
      - main
    paths:
      - "plugins/**"
      - ".github/workflows/deploy-plugins.yml"
  workflow_dispatch:

# Least-privilege baseline with package write available for future registry usage.
permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-plugins-main
  cancel-in-progress: false

jobs:
  build-plugins:
    name: Build ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - plugin-comment-moderation
          - plugin-stats-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Enables Gradle cache and provides Gradle CLI when wrapper is absent.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin JAR
        id: build
        shell: bash
        run: |
          set -euo pipefail
          plugin_dir="plugins/${{ matrix.plugin }}"

          if [[ ! -d "${plugin_dir}" ]]; then
            echo "::warning::Plugin directory not found, skip build: ${plugin_dir}"
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "exists=true" >> "$GITHUB_OUTPUT"

          cd "${plugin_dir}"
          if [[ -f "./gradlew" ]]; then
            chmod +x ./gradlew
            ./gradlew --no-daemon clean build -x test
          else
            # Fallback for plugins without committed wrapper.
            gradle --no-daemon clean build -x test
          fi

      - name: Upload plugin artifact
        if: steps.build.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}-jar
          path: plugins/${{ matrix.plugin }}/build/libs/*.jar
          if-no-files-found: error
          retention-days: 7

  deploy-plugins:
    name: Deploy plugin JARs to Halo server
    runs-on: ubuntu-latest
    needs:
      - build-plugins

    steps:
      - name: Download plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*-jar
          merge-multiple: true
          path: plugin-jars

      # Copy built JARs to the server using SCP.
      - name: Upload JARs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "plugin-jars/*.jar"
          target: "/tmp/halo-plugin-upload/"
          overwrite: true
          strip_components: 1

      - name: Install plugins and reload Halo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            TARGET_DIR="/opt/halo-blog/halo-data/plugins"
            UPLOAD_DIR="/tmp/halo-plugin-upload"

            mkdir -p "${TARGET_DIR}"
            cp -f "${UPLOAD_DIR}"/*.jar "${TARGET_DIR}/"
            rm -rf "${UPLOAD_DIR}"

            # Try graceful reload/restart endpoints first, then fallback to container restart.
            if curl -fsS --max-time 10 -X POST "http://localhost:8090/actuator/restart" > /dev/null; then
              echo "Halo actuator restart endpoint called successfully."
            elif curl -fsS --max-time 10 -X POST "http://localhost:8090/apis/api.console.halo.run/v1alpha1/plugins/reload" > /dev/null; then
              echo "Halo plugin reload endpoint called successfully."
            else
              echo "No reload endpoint available, restarting halo container."
              docker restart halo
            fi

