name: Deploy Halo Plugins

on:
  push:
    branches:
      - main
    paths:
      - plugins/**
  workflow_dispatch:

jobs:
  deploy-plugins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build plugin-comment-moderation
        working-directory: plugins/plugin-comment-moderation
        run: gradle build

      - name: Build plugin-stats-dashboard
        working-directory: plugins/plugin-stats-dashboard
        run: gradle build

      - name: Build plugin-auto-reply
        working-directory: plugins/plugin-auto-reply
        run: gradle build

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: halo-plugins
          path: |
            plugins/*/build/libs/*.jar
          retention-days: 30

      - name: Build and install plugins on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            if ! command -v gradle >/dev/null 2>&1; then
              echo "Gradle is not installed on server. Please install Gradle 8.10.2+ and JDK 21."
              exit 1
            fi

            PLUGIN_DIR="/opt/halo-blog/halo-data/plugins"
            mkdir -p "$PLUGIN_DIR"

            cd /opt/halo-blog
            git fetch origin
            git checkout main
            git pull origin main

            cd /opt/halo-blog/plugins/plugin-comment-moderation
            gradle build --no-daemon

            cd /opt/halo-blog/plugins/plugin-stats-dashboard
            gradle build --no-daemon

            cd /opt/halo-blog/plugins/plugin-auto-reply
            gradle build --no-daemon

            cp /opt/halo-blog/plugins/plugin-comment-moderation/build/libs/*.jar "$PLUGIN_DIR/" 2>/dev/null || true
            cp /opt/halo-blog/plugins/plugin-stats-dashboard/build/libs/*.jar "$PLUGIN_DIR/" 2>/dev/null || true
            cp /opt/halo-blog/plugins/plugin-auto-reply/build/libs/*.jar "$PLUGIN_DIR/" 2>/dev/null || true

            cd /opt/halo-blog
            docker-compose restart halo

            echo "Plugins deployed and Halo restarted!"
            sleep 30

            HALO_URL="${{ secrets.HALO_EXTERNAL_URL }}"
            TOKEN="${{ secrets.HALO_API_TOKEN }}"
            if [ -n "$HALO_URL" ] && [ -n "$TOKEN" ]; then
              for PLUGIN_NAME in plugin-comment-moderation plugin-stats-dashboard plugin-auto-reply; do
                curl -s -X PUT "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins/${PLUGIN_NAME}/plugin-state" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{"enable": true}' || echo "Warning: Failed to enable ${PLUGIN_NAME}"
              done
            fi
