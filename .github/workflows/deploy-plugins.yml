name: Deploy Halo Plugins

on:
  push:
    branches:
      - main
    paths:
      - plugins/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy-plugins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and install plugins on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 45m
          script: |
            set -euo pipefail

            if ! command -v java >/dev/null 2>&1; then
              echo "Java is not installed on server. Please install JDK 21."
              exit 1
            fi
            if ! command -v gradle >/dev/null 2>&1; then
              echo "Gradle is not installed on server. Please install Gradle 8.10.2+."
              exit 1
            fi

            java -version 2>&1 || true
            gradle --version 2>&1 || true

            cd /opt/halo-blog
            clean_generated_plugin_files() {
              git restore --worktree --staged \
                plugins/plugin-comment-moderation/build \
                plugins/plugin-comment-moderation/.gradle \
                plugins/plugin-stats-dashboard/build \
                plugins/plugin-stats-dashboard/.gradle \
                plugins/plugin-auto-reply/build \
                plugins/plugin-auto-reply/.gradle 2>/dev/null || true

              git clean -fd \
                plugins/plugin-comment-moderation/build \
                plugins/plugin-comment-moderation/.gradle \
                plugins/plugin-stats-dashboard/build \
                plugins/plugin-stats-dashboard/.gradle \
                plugins/plugin-auto-reply/build \
                plugins/plugin-auto-reply/.gradle 2>/dev/null || true
            }

            clean_generated_plugin_files
            rm -f .git/index.lock .git/refs/remotes/origin/main.lock || true
            git remote prune origin || true
            git update-ref -d refs/remotes/origin/main || true
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main
            clean_generated_plugin_files

            build_plugin() {
              local plugin_dir="$1"
              echo "Building ${plugin_dir}..."
              cd "/opt/halo-blog/plugins/${plugin_dir}"
              GRADLE_USER_HOME="/tmp/gradle-user-home" \
                gradle clean build --no-daemon \
                --project-cache-dir "/tmp/gradle-project-cache/${plugin_dir}"
              ls -lh "/opt/halo-blog/plugins/${plugin_dir}/build/libs/"*.jar
            }

            latest_jar() {
              local plugin_dir="$1"
              ls -1t "/opt/halo-blog/plugins/${plugin_dir}/build/libs/"*.jar | head -n 1
            }

            build_plugin "plugin-comment-moderation"
            build_plugin "plugin-stats-dashboard"
            build_plugin "plugin-auto-reply"

            HALO_URL="${{ secrets.HALO_EXTERNAL_URL }}"
            TOKEN="${{ secrets.HALO_API_TOKEN }}"
            if [ -z "$TOKEN" ]; then
              echo "HALO_API_TOKEN is required for install/upgrade plugin API."
              exit 1
            fi
            if [ -z "$HALO_URL" ]; then
              HALO_URL="http://127.0.0.1:8090"
            fi

            install_or_upgrade_plugin() {
              local name="$1"
              local jar="$2"
              local code
              local body_file="/tmp/${name}-api-response.json"

              echo "Processing ${name} with jar ${jar}"
              echo "Trying install first..."
              code=$(curl -sS -o "${body_file}" -w "%{http_code}" -X POST \
                "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins/install" \
                -H "Authorization: Bearer ${TOKEN}" \
                -F "source=FILE" \
                -F "file=@${jar}")

              if [ "$code" = "400" ] && grep -Eq "plugin-already-exists|plugin-alreay-exists|already[[:space:]]exists|已经存在" "${body_file}"; then
                echo "Plugin ${name} already exists, switching to upgrade..."
                code=$(curl -sS -o "${body_file}" -w "%{http_code}" -X POST \
                  "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins/${name}/upgrade" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -F "source=FILE" \
                  -F "file=@${jar}")
              fi

              if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
                echo "Install/upgrade failed for ${name}, http=${code}"
                cat "${body_file}" || true
                exit 1
              fi

              local retries=6
              while true; do
                code=$(curl -sS -o "${body_file}" -w "%{http_code}" -X PUT \
                  "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins/${name}/plugin-state" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{"enable": true, "async": true}')

                if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
                  break
                fi

                if [ "$code" = "409" ] && [ "$retries" -gt 0 ]; then
                  echo "Enable conflict for ${name}, retrying..."
                  retries=$((retries - 1))
                  sleep 3
                  continue
                fi

                echo "Enable failed for ${name}, http=${code}"
                cat "${body_file}" || true
                exit 1
              done
            }

            install_or_upgrade_plugin \
              "plugin-comment-moderation" \
              "$(latest_jar "plugin-comment-moderation")"
            install_or_upgrade_plugin \
              "plugin-stats-dashboard" \
              "$(latest_jar "plugin-stats-dashboard")"
            install_or_upgrade_plugin \
              "plugin-auto-reply" \
              "$(latest_jar "plugin-auto-reply")"

            echo "Query plugin list after deployment:"
            curl -sS -X GET "${HALO_URL}/apis/api.console.halo.run/v1alpha1/plugins" \
              -H "Authorization: Bearer ${TOKEN}" || true

            echo "Recent Halo logs related to plugin loading:"
            docker logs --since 5m halo 2>&1 | grep -Ei \
              "plugin|pf4j|plugin-auto-reply|plugin-comment-moderation|plugin-stats-dashboard|failed|error|exception" || true

            cd /opt/halo-blog
            clean_generated_plugin_files
