name: Deploy Services

on:
  # Build and deploy service images only when service code changes.
  push:
    branches:
      - main
    paths:
      - "services/**"
      - ".github/workflows/deploy-services.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

# Required for checking out source and pushing images to GHCR.
permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-services-main
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - comment-filter
          - auto-reply
          - server-monitor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy services on server
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: Pull and restart services
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_PREFIX
          script: |
            set -euo pipefail
            cd /opt/halo-blog

            # Exposed for docker-compose variable interpolation.
            export IMAGE_PREFIX="${IMAGE_PREFIX}"

            docker-compose -f /opt/halo-blog/docker-compose.yml pull comment-filter auto-reply server-monitor
            docker-compose -f /opt/halo-blog/docker-compose.yml up -d --no-deps comment-filter auto-reply server-monitor

