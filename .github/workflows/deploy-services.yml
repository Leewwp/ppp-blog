name: Deploy Services

on:
  push:
    branches:
      - main
    paths:
      - services/**
      - .github/workflows/deploy-services.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy services on server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/halo-blog || { echo "Directory /opt/halo-blog not found"; exit 1; }

            rm -f .git/index.lock .git/refs/remotes/origin/main.lock || true
            git remote prune origin || true
            git update-ref -d refs/remotes/origin/main || true
            git fetch --prune origin
            git checkout main
            git pull --ff-only origin main

            echo "Ensuring core services are running..."
            docker-compose up -d mysql redis
            docker-compose up -d halo

            docker-compose up -d --no-deps --build --force-recreate comment-filter auto-reply server-monitor
            docker-compose ps halo halo-mysql halo-redis comment-filter auto-reply server-monitor
            echo "Services restarted!"
