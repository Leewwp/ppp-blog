name: Deploy Services

on:
  push:
    branches:
      - main
    paths:
      - services/**
      - .github/workflows/deploy-services.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy services on server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/halo-blog || { echo "Directory /opt/halo-blog not found"; exit 1; }

            rm -f .git/index.lock .git/refs/remotes/origin/main.lock || true
            git remote prune origin || true
            git update-ref -d refs/remotes/origin/main || true
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main

            echo "Checking core services..."
            if docker ps --format '{{.Names}}' | grep -qx "halo"; then
              echo "Halo is already running."
            else
              echo "Halo is not running, trying to start mysql/redis/halo..."
              if ! docker-compose up -d mysql redis halo; then
                MYSQL_PORT="${MYSQL_HOST_PORT:-3307}"
                echo "Warning: failed to start core services. Common cause: host port ${MYSQL_PORT} is already in use."
                ss -lntp 2>/dev/null | grep ":${MYSQL_PORT}" || true
                docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -E 'halo|mysql|redis' || true
              fi
            fi

            docker-compose up -d --no-deps --build --force-recreate comment-filter auto-reply server-monitor
            docker-compose ps halo mysql redis comment-filter auto-reply server-monitor
            echo "Services restarted!"
