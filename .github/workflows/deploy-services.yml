name: Deploy Services

on:
  push:
    branches:
      - main
    paths:
      - services/**
      - .github/workflows/deploy-services.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy services on server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/halo-blog || { echo "Directory /opt/halo-blog not found"; exit 1; }

            rm -f .git/index.lock .git/refs/remotes/origin/main.lock || true
            git remote prune origin || true
            git update-ref -d refs/remotes/origin/main || true
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main

            wait_halo_ready() {
              local retries=24
              while [ "$retries" -gt 0 ]; do
                if docker ps --format '{{.Names}}' | grep -qx "halo"; then
                  health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' halo 2>/dev/null || echo missing)"
                  if [ "$health" = "healthy" ] || [ "$health" = "unknown" ]; then
                    return 0
                  fi
                  echo "Halo health status: ${health}, waiting..."
                else
                  echo "Halo container is not running yet, waiting..."
                fi
                retries=$((retries - 1))
                sleep 5
              done
              return 1
            }

            echo "Checking core services..."
            if docker ps --format '{{.Names}}' | grep -qx "halo"; then
              echo "Halo is already running, checking health..."
            else
              echo "Halo is not running, starting mysql/redis/halo..."
              docker-compose up -d mysql redis halo
            fi
            if ! wait_halo_ready; then
              echo "ERROR: halo failed to become ready."
              docker-compose ps mysql redis halo || true
              docker-compose logs --tail 200 halo || true
              exit 1
            fi

            docker-compose up -d --no-deps --build --force-recreate comment-filter auto-reply server-monitor
            docker-compose ps halo mysql redis comment-filter auto-reply server-monitor
            echo "Services restarted!"
