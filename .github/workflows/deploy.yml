name: Deploy Full Stack

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "services/**"
      - "plugins/**"
      - ".github/workflows/deploy-services.yml"
      - ".github/workflows/deploy-plugins.yml"
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/halo-blog
            
            # Pull latest code
            rm -f .git/index.lock .git/refs/remotes/origin/main.lock || true
            git remote prune origin || true
            git update-ref -d refs/remotes/origin/main || true
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main

            if [ -f scripts/apply-theme-overrides.sh ]; then
              chmod +x scripts/apply-theme-overrides.sh
              ./scripts/apply-theme-overrides.sh
            fi
            
            # Pull latest images if available and recreate changed containers without full shutdown
            docker-compose pull || true
            docker-compose up -d --remove-orphans
            
            # Wait for services
            sleep 10
            docker-compose ps
            
            echo "Deployment completed!"
