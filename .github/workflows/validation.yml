name: Halo Validation Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  HALO_BASIC_AUTH: Basic YWRtaW46MTIzNDU2
  VALIDATION_SERVER_PATH: /opt/halo-validation
  VALIDATION_PORT: '18090'
  VALIDATION_BASE_URL: http://${{ secrets.SERVER_HOST }}:18090
  VALIDATION_INTERNAL_URL: http://127.0.0.1:18090
  VALIDATION_RESULTS_DIR: /opt/halo-validation/validation/build/test-results

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Halo ref
        id: halo-ref
        shell: bash
        run: echo "sha=$(git ls-tree HEAD halo | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      - name: Check out Halo
        uses: actions/checkout@v4
        with:
          repository: halo-dev/halo
          ref: ${{ steps.halo-ref.outputs.sha }}
          path: halo

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Gradle cache
        uses: gradle/gradle-build-action@v3
        with:
          cache-dependency-path: |
            halo/**/*.gradle
            halo/**/gradle/wrapper/gradle-wrapper.properties

      - name: Run API unit tests
        run: ./gradlew :api:test --no-daemon
        working-directory: halo

      - name: Run application unit tests
        run: ./gradlew :application:test --no-daemon
        working-directory: halo

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            halo/**/build/test-results/**/*.xml
            halo/**/build/reports/tests/test/**/index.html

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Halo ref
        id: halo-ref
        shell: bash
        run: echo "sha=$(git ls-tree HEAD halo | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      - name: Check out Halo
        uses: actions/checkout@v4
        with:
          repository: halo-dev/halo
          ref: ${{ steps.halo-ref.outputs.sha }}
          path: halo

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Gradle cache
        uses: gradle/gradle-build-action@v3

      - name: Run integration tests
        run: ./gradlew :application:test --tests '*IntegrationTest' --no-daemon
        working-directory: halo

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            halo/**/build/test-results/**/*.xml
            halo/**/build/reports/tests/**/index.html

  validation-server-tests:
    name: Validation Instance Tests
    needs: [unit-tests, integration-tests]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy validation instance via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          VALIDATION_BASE_URL: ${{ env.VALIDATION_BASE_URL }}
          VALIDATION_SERVER_PATH: ${{ env.VALIDATION_SERVER_PATH }}
          VALIDATION_PORT: ${{ env.VALIDATION_PORT }}
          VALIDATION_MYSQL_ROOT_PASSWORD: ${{ secrets.VALIDATION_MYSQL_ROOT_PASSWORD }}
          VALIDATION_MYSQL_PASSWORD: ${{ secrets.VALIDATION_MYSQL_PASSWORD }}
          VALIDATION_REDIS_PASSWORD: ${{ secrets.VALIDATION_REDIS_PASSWORD }}
          VALIDATION_RESULTS_DIR: ${{ env.VALIDATION_RESULTS_DIR }}
          VALIDATED_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: VALIDATION_BASE_URL,VALIDATION_SERVER_PATH,VALIDATION_PORT,VALIDATION_MYSQL_ROOT_PASSWORD,VALIDATION_MYSQL_PASSWORD,VALIDATION_REDIS_PASSWORD,VALIDATION_RESULTS_DIR,VALIDATED_SHA
          script: |
            set -e
            git config --global --add safe.directory /opt/halo-blog || true
            git config --global --add safe.directory /opt/halo-blog/.git || true
            mkdir -p "$VALIDATION_SERVER_PATH"
            if [ ! -d "$VALIDATION_SERVER_PATH/.git" ]; then
              git clone /opt/halo-blog "$VALIDATION_SERVER_PATH"
            fi

            cd "$VALIDATION_SERVER_PATH"
            git config --global --add safe.directory "$VALIDATION_SERVER_PATH" || true
            rm -f .git/index.lock .git/refs/remotes/origin/main.lock || true
            git remote prune origin || true
            git update-ref -d refs/remotes/origin/main || true
            git fetch --prune origin
            git checkout main
            git reset --hard "$VALIDATED_SHA"

            mkdir -p validation/server "$VALIDATION_RESULTS_DIR"
            {
              echo "MYSQL_ROOT_PASSWORD=$VALIDATION_MYSQL_ROOT_PASSWORD"
              echo "MYSQL_PASSWORD=$VALIDATION_MYSQL_PASSWORD"
              echo "REDIS_PASSWORD=$VALIDATION_REDIS_PASSWORD"
              echo "VALIDATION_PORT=$VALIDATION_PORT"
              echo "HALO_VALIDATION_EXTERNAL_URL=$VALIDATION_BASE_URL"
              echo "TZ=Asia/Shanghai"
            } > validation/server/.env.validation

            docker compose -f validation/server/docker-compose.validation.yml --env-file validation/server/.env.validation pull || true
            docker compose -f validation/server/docker-compose.validation.yml --env-file validation/server/.env.validation up -d --remove-orphans

      - name: Wait for validation instance readiness
        shell: bash
        run: |
          for i in {1..120}; do
            if curl -sf "$VALIDATION_BASE_URL/actuator/health/readiness" > /dev/null 2>&1; then
              echo "Validation instance is ready"
              exit 0
            fi
            echo "Waiting for validation instance... ($i/120)"
            sleep 5
          done
          echo "Validation instance failed to become ready"
          exit 1

      - name: Initialize validation Halo
        shell: bash
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST "$VALIDATION_BASE_URL/system/setup" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "siteTitle=Validation" \
            --data-urlencode "username=admin" \
            --data-urlencode "password=123456" \
            --data-urlencode "email=validation@halo.run" \
            --data-urlencode "language=en" \
            --data-urlencode "externalUrl=$VALIDATION_BASE_URL")
          status=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          if [ "$status" != "204" ] && [ "$status" != "409" ]; then
            echo "Halo setup failed with status $status"
            echo "$body"
            exit 1
          fi

      - name: Run remote API validation
        uses: appleboy/ssh-action@v1.0.0
        env:
          HALO_BASIC_AUTH: ${{ env.HALO_BASIC_AUTH }}
          VALIDATION_INTERNAL_URL: ${{ env.VALIDATION_INTERNAL_URL }}
          VALIDATION_RESULTS_DIR: ${{ env.VALIDATION_RESULTS_DIR }}
          VALIDATION_SERVER_PATH: ${{ env.VALIDATION_SERVER_PATH }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: HALO_BASIC_AUTH,VALIDATION_INTERNAL_URL,VALIDATION_RESULTS_DIR,VALIDATION_SERVER_PATH
          script: |
            set -e
            cd "$VALIDATION_SERVER_PATH"
            RESULTS_LOG="$VALIDATION_RESULTS_DIR/api-validation.log"
            RESULTS_DIR="$VALIDATION_RESULTS_DIR" \
            HALO_URL="$VALIDATION_INTERNAL_URL" \
            HALO_API_BASE="$VALIDATION_INTERNAL_URL/apis" \
            HALO_BASIC_AUTH="$HALO_BASIC_AUTH" \
            ./validation/scripts/validate-apis.sh all | tee "$RESULTS_LOG"

            passed=$(awk '/\[INFO\] Passed:/ {print $NF}' "$RESULTS_LOG" | tail -1)
            failed=$(awk '/\[INFO\] Failed:/ {print $NF}' "$RESULTS_LOG" | tail -1)

            printf '{"passed":%s,"failed":%s}\n' "${passed:-0}" "${failed:-0}" > "$VALIDATION_RESULTS_DIR/api-validation-summary.json"

      - name: Run remote load tests
        uses: appleboy/ssh-action@v1.0.0
        env:
          HALO_BASIC_AUTH: ${{ env.HALO_BASIC_AUTH }}
          VALIDATION_INTERNAL_URL: ${{ env.VALIDATION_INTERNAL_URL }}
          VALIDATION_RESULTS_DIR: ${{ env.VALIDATION_RESULTS_DIR }}
          VALIDATION_SERVER_PATH: ${{ env.VALIDATION_SERVER_PATH }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: HALO_BASIC_AUTH,VALIDATION_INTERNAL_URL,VALIDATION_RESULTS_DIR,VALIDATION_SERVER_PATH
          script: |
            set -e
            cd "$VALIDATION_SERVER_PATH"
            docker run --rm --network host \
              -v "$PWD/validation:/scripts:ro" \
              -v "$VALIDATION_RESULTS_DIR:/results" \
              -e HALO_URL="$VALIDATION_INTERNAL_URL" \
              -e HALO_BASIC_AUTH="$HALO_BASIC_AUTH" \
              grafana/k6:0.49.0 run /scripts/api-load.js \
              --summary-export=/results/load-test-summary.json \
              --out json=/results/load-test-events.json

      - name: Run remote stress tests
        uses: appleboy/ssh-action@v1.0.0
        env:
          HALO_BASIC_AUTH: ${{ env.HALO_BASIC_AUTH }}
          VALIDATION_INTERNAL_URL: ${{ env.VALIDATION_INTERNAL_URL }}
          VALIDATION_RESULTS_DIR: ${{ env.VALIDATION_RESULTS_DIR }}
          VALIDATION_SERVER_PATH: ${{ env.VALIDATION_SERVER_PATH }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: HALO_BASIC_AUTH,VALIDATION_INTERNAL_URL,VALIDATION_RESULTS_DIR,VALIDATION_SERVER_PATH
          script: |
            set -e
            cd "$VALIDATION_SERVER_PATH"
            docker run --rm --network host \
              -v "$PWD/validation:/scripts:ro" \
              -v "$VALIDATION_RESULTS_DIR:/results" \
              -e HALO_URL="$VALIDATION_INTERNAL_URL" \
              -e HALO_BASIC_AUTH="$HALO_BASIC_AUTH" \
              grafana/k6:0.49.0 run /scripts/stress-test.js \
              --summary-export=/results/stress-test-summary.json \
              --out json=/results/stress-test-events.json

      - name: Package remote validation artifacts
        if: always()
        uses: appleboy/ssh-action@v1.0.0
        env:
          VALIDATION_RESULTS_DIR: ${{ env.VALIDATION_RESULTS_DIR }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: VALIDATION_RESULTS_DIR
          script: |
            set -e
            mkdir -p "$VALIDATION_RESULTS_DIR"
            tar -czf /tmp/validation-results.tgz -C "$VALIDATION_RESULTS_DIR" .

      - name: Download validation artifacts
        if: always()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: /tmp/validation-results.tgz
          target: validation-artifacts
          overwrite: true

      - name: Extract validation artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p validation-artifacts/test-results
          archive_path=$(find validation-artifacts -name 'validation-results.tgz' -print -quit 2>/dev/null || true)
          if [ -z "$archive_path" ]; then
            echo "Validation artifact archive not found; continuing with placeholder results"
            printf 'Validation artifacts were not collected.\n' > validation-artifacts/test-results/collection-status.txt
            exit 0
          fi
          tar -xzf "$archive_path" -C validation-artifacts/test-results

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-server-results
          path: validation-artifacts/test-results
          if-no-files-found: warn

  coverage:
    name: Code Coverage Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Halo ref
        id: halo-ref
        shell: bash
        run: echo "sha=$(git ls-tree HEAD halo | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      - name: Check out Halo
        uses: actions/checkout@v4
        with:
          repository: halo-dev/halo
          ref: ${{ steps.halo-ref.outputs.sha }}
          path: halo

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Gradle cache
        uses: gradle/gradle-build-action@v3
        with:
          cache-dependency-path: |
            halo/**/*.gradle
            halo/**/gradle/wrapper/gradle-wrapper.properties

      - name: Generate coverage report
        run: ./gradlew :application:jacocoTestReport --no-daemon
        working-directory: halo

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            halo/**/build/reports/jacoco/test/*.xml

  validation-summary:
    name: Validation Summary
    if: always()
    needs: [unit-tests, integration-tests, validation-server-tests, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download validation artifacts
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: validation-server-results
          path: artifacts/validation-server-results

      - name: Write workflow status summary
        shell: bash
        run: |
          {
            echo "# Halo Validation Pipeline Summary"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Unit Tests | ${{ needs.unit-tests.result }} |"
            echo "| Integration Tests | ${{ needs.integration-tests.result }} |"
            echo "| Validation Instance Tests | ${{ needs.validation-server-tests.result }} |"
            echo "| Coverage | ${{ needs.coverage.result }} |"
            echo
            echo "Validation Base URL: \`$VALIDATION_BASE_URL\`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Render performance summary
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/validation-server-results
          api_summary=$(find artifacts/validation-server-results -name 'api-validation-summary.json' -print -quit 2>/dev/null || true)
          load_summary=$(find artifacts/validation-server-results -name 'load-test-summary.json' -print -quit 2>/dev/null || true)
          load_events=$(find artifacts/validation-server-results -name 'load-test-events.json' -print -quit 2>/dev/null || true)
          stress_summary=$(find artifacts/validation-server-results -name 'stress-test-summary.json' -print -quit 2>/dev/null || true)
          stress_events=$(find artifacts/validation-server-results -name 'stress-test-events.json' -print -quit 2>/dev/null || true)
          node validation/scripts/render-k6-summary.js \
            --api-summary "${api_summary:-}" \
            --load-summary "${load_summary:-}" \
            --load-events "${load_events:-}" \
            --stress-summary "${stress_summary:-}" \
            --stress-events "${stress_events:-}" >> "$GITHUB_STEP_SUMMARY"
