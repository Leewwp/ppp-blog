services:
  halo:
    image: halohub/halo:2.22
    container_name: halo
    restart: on-failure:3
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      halo-network:
    ports:
      - "8090:8090"
    volumes:
      - ./halo-data:/root/.halo2
    environment:
      - SPRING_R2DBC_URL=r2dbc:pool:mysql://mysql:3306/halo
      - SPRING_R2DBC_USERNAME=halo
      - SPRING_R2DBC_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_SQL_INIT_PLATFORM=mysql
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_DATABASE=0
      - SERVER_PORT=8090
      - HALO_EXTERNAL_URL=${HALO_EXTERNAL_URL:-http://localhost:8090}
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,globalinfo,prometheus
      - MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED=true
      - MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED=true
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mysql:
    image: mysql:8.0
    container_name: halo-mysql
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=halo
      - MYSQL_USER=halo
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: halo-redis
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  comment-filter:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/comment-filter:latest
    container_name: comment-filter
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "8091:8091"
    environment:
      - PORT=8091
      - WORDS_FILE=/app/data/sensitive_words.txt
      - COMMENT_REVIEW_AI_ENABLED=${COMMENT_REVIEW_AI_ENABLED:-true}
      - COMMENT_REVIEW_AI_TIMEOUT_SECONDS=${COMMENT_REVIEW_AI_TIMEOUT_SECONDS:-30}
      - COMMENT_REVIEW_AI_MAX_CONTENT_CHARS=${COMMENT_REVIEW_AI_MAX_CONTENT_CHARS:-500}
      - MINIMAX_API_URL=${MINIMAX_API_URL:-https://api.minimaxi.com/anthropic/v1/messages}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.5}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - TZ=Asia/Shanghai

  auto-reply:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/auto-reply:latest
    container_name: auto-reply
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "8092:8092"
    environment:
      - PORT=8092
      - RULES_FILE=/app/config/rules.json
      - AUTO_REPLY_AI_ENABLED=${AUTO_REPLY_AI_ENABLED:-true}
      - AUTO_REPLY_AI_TIMEOUT_SECONDS=${AUTO_REPLY_AI_TIMEOUT_SECONDS:-30}
      - AUTO_REPLY_MAX_COMMENT_CHARS=${AUTO_REPLY_MAX_COMMENT_CHARS:-180}
      - AUTO_REPLY_MAX_REPLY_CHARS=${AUTO_REPLY_MAX_REPLY_CHARS:-120}
      - AUTO_REPLY_DAILY_CALL_LIMIT=${AUTO_REPLY_DAILY_CALL_LIMIT:-300}
      - AUTO_REPLY_DAILY_AUTHOR_LIMIT=${AUTO_REPLY_DAILY_AUTHOR_LIMIT:-20}
      - AUTO_REPLY_AUTHOR_COOLDOWN_SECONDS=${AUTO_REPLY_AUTHOR_COOLDOWN_SECONDS:-60}
      - MINIMAX_API_URL=${MINIMAX_API_URL:-https://api.minimaxi.com/anthropic/v1/messages}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.5}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - TZ=Asia/Shanghai

  server-monitor:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/server-monitor:latest
    container_name: server-monitor
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "8093:8093"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - PORT=8093
      - TZ=Asia/Shanghai

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    restart: on-failure:3
    depends_on:
      - halo
      - comment-filter
      - auto-reply
      - server-monitor
    networks:
      halo-network:
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro

  grafana:
    image: grafana/grafana:10.3.0
    container_name: grafana
    restart: on-failure:3
    depends_on:
      - prometheus
    networks:
      halo-network:
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - TZ=Asia/Shanghai

networks:
  halo-network:
    driver: bridge
