services:
  halo:
    image: halohub/halo:2.22
    container_name: halo
    restart: on-failure:3
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      halo-network:
    ports:
      - "8090:8090"
    volumes:
      - ./halo-data:/root/.halo2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/halo?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=halo
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_REDIS_DATABASE=0
      - SERVER_PORT=8090
      - HALO_EXTERNAL_URL=${HALO_EXTERNAL_URL:-http://localhost:8090}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mysql:
    image: mysql:8.0
    container_name: halo-mysql
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=halo
      - MYSQL_USER=halo
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: halo-redis
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  comment-filter:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/comment-filter:latest
    container_name: comment-filter
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "8091:8091"
    environment:
      - PORT=8091
      - WORDS_FILE=/app/data/sensitive_words.txt
      - TZ=Asia/Shanghai

  auto-reply:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/auto-reply:latest
    container_name: auto-reply
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "8092:8092"
    environment:
      - PORT=8092
      - RULES_FILE=/app/config/rules.json
      - TZ=Asia/Shanghai

  server-monitor:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/server-monitor:latest
    container_name: server-monitor
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "8093:8093"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - PORT=8093
      - TZ=Asia/Shanghai

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    restart: on-failure:3
    depends_on:
      - halo
      - comment-filter
      - auto-reply
      - server-monitor
    networks:
      halo-network:
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro

  grafana:
    image: grafana/grafana:10.3.0
    container_name: grafana
    restart: on-failure:3
    depends_on:
      - prometheus
    networks:
      halo-network:
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - TZ=Asia/Shanghai

networks:
  halo-network:
    driver: bridge
