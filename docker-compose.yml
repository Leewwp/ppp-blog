services:
  halo:
    image: halohub/halo:2.22
    container_name: halo
    restart: on-failure:3
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      halo-network:
    ports:
      - "8090:8090"
    volumes:
      - ./halo-data:/root/.halo2
    environment:
      - SPRING_R2DBC_URL=r2dbc:pool:mysql://mysql:3306/halo
      - SPRING_R2DBC_USERNAME=halo
      - SPRING_R2DBC_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_SQL_INIT_PLATFORM=mysql
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_DATABASE=0
      - SERVER_PORT=8090
      - HALO_EXTERNAL_URL=${HALO_EXTERNAL_URL:-http://localhost:8090}
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,globalinfo,prometheus,restart
      - MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED=true
      - MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED=true
      - JVM_OPTS=-Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxRAMPercentage=75.0
      - TZ=Asia/Shanghai
    mem_limit: 1024m
    cpus: "1.50"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mysql:
    image: mysql:8.0
    container_name: halo-mysql
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=halo
      - MYSQL_USER=halo
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
    mem_limit: 512m
    cpus: "0.80"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: halo-redis
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    mem_limit: 192m
    cpus: "0.30"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  comment-filter:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/comment-filter:latest
    container_name: comment-filter
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "8091:8091"
    environment:
      - PORT=8091
      - WORDS_FILE=/app/data/sensitive_words.txt
      - COMMENT_REVIEW_AI_ENABLED=${COMMENT_REVIEW_AI_ENABLED:-true}
      - COMMENT_REVIEW_AI_TIMEOUT_SECONDS=${COMMENT_REVIEW_AI_TIMEOUT_SECONDS:-30}
      - COMMENT_REVIEW_AI_MAX_CONTENT_CHARS=${COMMENT_REVIEW_AI_MAX_CONTENT_CHARS:-500}
      - MINIMAX_API_URL=${MINIMAX_API_URL:-https://api.minimaxi.com/anthropic/v1/messages}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.5}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - TZ=Asia/Shanghai
    mem_limit: 128m
    cpus: "0.30"

  auto-reply:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/auto-reply:latest
    container_name: auto-reply
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "8092:8092"
    environment:
      - PORT=8092
      - RULES_FILE=/app/config/rules.json
      - AUTO_REPLY_AI_ENABLED=${AUTO_REPLY_AI_ENABLED:-true}
      - AUTO_REPLY_AI_TIMEOUT_SECONDS=${AUTO_REPLY_AI_TIMEOUT_SECONDS:-30}
      - AUTO_REPLY_MAX_COMMENT_CHARS=${AUTO_REPLY_MAX_COMMENT_CHARS:-180}
      - AUTO_REPLY_MAX_REPLY_CHARS=${AUTO_REPLY_MAX_REPLY_CHARS:-120}
      - AUTO_REPLY_DAILY_CALL_LIMIT=${AUTO_REPLY_DAILY_CALL_LIMIT:-300}
      - AUTO_REPLY_DAILY_AUTHOR_LIMIT=${AUTO_REPLY_DAILY_AUTHOR_LIMIT:-20}
      - AUTO_REPLY_AUTHOR_COOLDOWN_SECONDS=${AUTO_REPLY_AUTHOR_COOLDOWN_SECONDS:-60}
      - MINIMAX_API_URL=${MINIMAX_API_URL:-https://api.minimaxi.com/anthropic/v1/messages}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.5}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - TZ=Asia/Shanghai
    mem_limit: 192m
    cpus: "0.40"

  server-monitor:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/server-monitor:latest
    container_name: server-monitor
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "8093:8093"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - PORT=8093
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - TZ=Asia/Shanghai
    mem_limit: 96m
    cpus: "0.30"

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    restart: on-failure:3
    depends_on:
      - halo
      - comment-filter
      - auto-reply
      - server-monitor
    networks:
      halo-network:
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    mem_limit: 192m
    cpus: "0.30"

  grafana:
    image: grafana/grafana:10.3.0
    container_name: grafana
    restart: on-failure:3
    depends_on:
      - prometheus
    networks:
      halo-network:
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GF_SMTP_HOST:-}
      - GF_SMTP_USER=${GF_SMTP_USER:-}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS:-}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME:-PPP-Blog Alert}
      - TZ=Asia/Shanghai
    mem_limit: 192m
    cpus: "0.30"

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ./monitoring/loki/data:/loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    mem_limit: 256m
    cpus: "0.40"

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    restart: on-failure:3
    depends_on:
      - loki
    networks:
      halo-network:
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - ./monitoring/promtail/positions:/tmp
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - -config.file=/etc/promtail/config.yml
    mem_limit: 96m
    cpus: "0.20"

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: on-failure:3
    networks:
      halo-network:
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_LOG_RETENTION_HOURS=72
      - KAFKA_LOG_SEGMENT_BYTES=104857600
      - KAFKA_HEAP_OPTS=-Xms256m -Xmx512m
      - CLUSTER_ID=ppp-blog-kafka-cluster-001
      - TZ=Asia/Shanghai
    mem_limit: 640m
    cpus: "0.60"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - kafka-data:/tmp/kraft-combined-logs

  comment-service:
    image: ghcr.io/${IMAGE_PREFIX:-ppp-blog}/comment-service:latest
    container_name: comment-service
    restart: on-failure:3
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      halo-network:
    ports:
      - "8094:8094"
    environment:
      - PORT=8094
      - MYSQL_DSN=halo:${MYSQL_PASSWORD}@tcp(mysql:3306)/halo?parseTime=true&loc=Asia%2FShanghai&charset=utf8mb4
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_COMMENT=comment-events
      - KAFKA_CONSUMER_GROUP=comment-service-group
      - SHARD_COUNT=8
      - TZ=Asia/Shanghai
    mem_limit: 256m
    cpus: "0.50"

volumes:
  kafka-data:

networks:
  halo-network:
    driver: bridge
