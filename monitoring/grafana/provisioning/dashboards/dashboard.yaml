apiVersion: 1

providers:
  # File-based dashboard loader.
  - name: Blog Dashboards
    orgId: 1
    folder: Blog
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      # Folder containing JSON dashboards bundled with this repo.
      path: /etc/grafana/provisioning/dashboards
