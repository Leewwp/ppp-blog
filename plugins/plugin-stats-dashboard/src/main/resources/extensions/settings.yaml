apiVersion: v1alpha1
kind: Setting
metadata:
  name: plugin-stats-dashboard-settings
spec:
  forms:
    - group: basic
      label: Basic
      formSchema:
        - $formkit: switch
          name: trackingEnabled
          label: Tracking Enabled
          value: true
          help: Enable visitor and page-view tracking.
        - $formkit: number
          name: visitorTimeout
          label: Visitor Timeout (Seconds)
          value: 300
          validation: required|number|min:30|max:3600
          help: Active window for each online visitor IP.
